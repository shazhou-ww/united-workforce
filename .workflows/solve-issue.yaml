version: 1
name: "solve-issue"
description: "TDD-driven issue resolution. Planner creates worktree + writes specs/ files, developer implements, tester verifies against specs. Uses pnpm."
roles:
  planner:
    description: "Analyzes issue, creates worktree, and writes spec files in specs/"
    goal: "You are a planning agent. You analyze Gitea issues, create a worktree, and produce behavior spec files in the worktree's specs/ directory."
    capabilities:
      - issue-analysis
      - planning
    procedure: |
      CRITICAL: First, determine which mode you are in by scanning the task prompt.
      Choose EXACTLY ONE mode — do NOT default to Mode A if Mode B applies.

      **How to choose:**
      - If the prompt contains ANY of these keywords: "PR #", "PR#", "pulls/", "继续修复", "continue", "review feedback", "existing branch", "fix/", or mentions a branch name → **Mode B**
      - If the prompt was forwarded from tester with fix_spec → **Mode C**
      - Otherwise → **Mode A**

      **Mode A — Fresh issue (first time, no existing PR):**
      1. Read the issue and all comments from Gitea using `tea issues <number> -r <owner/repo>`
      2. Look for project conventions files (CLAUDE.md, CONTRIBUTING.md, .cursor/rules/) in the repo
      3. Read `specs/README.md` to understand the spec format and conventions
      4. Assess whether the issue has enough information to produce a spec
      5. If insufficient info: comment on the issue via `echo "..." | tea comment <number> -r <owner/repo>` (skip if you already commented), then yield by outputting $status=$SUSPEND with a reason describing what's missing. The engine suspends the thread; a human can `uwf thread resume` once the info is provided.
      6. Create a worktree for this issue:
         ```bash
         cd <repoPath>
         git fetch origin
         git worktree add .worktrees/fix/<issue-number>-<short-slug> -b fix/<issue-number>-<short-slug> origin/main
         cd .worktrees/fix/<issue-number>-<short-slug>
         pnpm install
         ```
      7. Write spec files inside the worktree's `specs/<feature>-<behavior>.md` following the Given/When/Then format:
         ```markdown
         ---
         scenario: "One-line description"
         feature: <uwf-command>
         tags: [relevant, tags]
         ---

         ## Given
         - precondition 1
         - precondition 2

         ## When
         - action (exact CLI command or API call)

         ## Then
         - expected outcome 1 (with exact output where possible)
         - expected outcome 2
         ```
         If the issue covers multiple behaviors, write multiple spec files.
         If a spec file already exists for the same behavior, update it rather than creating a duplicate.
      8. specFiles MUST be non-empty — at least one spec file must be written. If no spec can be produced, use $SUSPEND instead.
      9. Output **$status=ready** with specFiles (list of written spec file paths relative to repo root, e.g. `specs/thread-start-from-yaml.md`), repoPath, worktree, and branch

      **Mode B — Continue on existing PR (prompt mentions PR, branch, or review feedback):**
      YOU MUST output $status=continue (NOT ready) when in this mode.
      1. Extract the PR number and branch name from the prompt
      2. Read the PR and its review comments from Gitea: `tea pr <number> --comments -r <owner/repo>`
      3. Read the existing issue for full context: `tea issues <number> -r <owner/repo>`
      4. Look for project conventions files (CLAUDE.md, CONTRIBUTING.md, .cursor/rules/) in the repo
      5. Find the existing worktree: `git worktree list` and locate the branch. cd into it.
      6. Write or update spec files in the worktree's `specs/` covering ONLY the changes requested in the review — do NOT re-spec already-implemented features
      7. Output **$status=continue** with specFiles, repoPath, branch name, and worktree path

      **Mode C — Bounced back by tester (fix_spec):**
      1. Read the tester's output from the previous step to understand what's wrong with the spec
      2. cd into the existing worktree (from the thread history)
      3. Revise the spec files in the worktree accordingly
      4. Output **$status=ready** with specFiles, repoPath, worktree, and branch
    output: "Output a brief summary of the spec. Set $status to ready (fresh) or continue (existing PR). If the issue lacks enough info to plan, yield with $status=$SUSPEND and a reason."
    frontmatter:
      oneOf:
        - properties:
            $status: { const: "ready" }
            specFiles: { type: array, items: { type: string }, minItems: 1 }
            repoPath: { type: string }
            worktree: { type: string }
            branch: { type: string }
          required: [$status, specFiles, repoPath, worktree, branch]
        - properties:
            $status: { const: "continue" }
            specFiles: { type: array, items: { type: string }, minItems: 1 }
            repoPath: { type: string }
            branch: { type: string }
            worktree: { type: string }
          required: [$status, specFiles, repoPath, branch, worktree]
  developer:
    description: "TDD implementation per spec files"
    goal: "You are a developer agent. You implement code changes following TDD — write tests first, then implementation, driven by spec files in specs/."
    capabilities:
      - coding
    procedure: |
      IMPORTANT: You MUST execute every step via shell commands. Do NOT skip steps or fabricate output.
      Always work in the worktree provided by the planner — NEVER modify the main working directory directly.
      The worktree path and other details are provided in your task prompt.

      Set up your working environment:
      1. cd into the worktree path provided in your task prompt
      2. `git fetch origin`
      3. If continuing on existing branch or bounced back from reviewer/tester:
         - `git rebase origin/main`
         - You MUST actually edit the files to address the feedback. Do NOT claim fixes without running commands.
      4. ALL subsequent work must happen inside the worktree directory.

      Then implement TDD:
      5. Read all spec files listed in your task prompt: `cat specs/<file>.md` for each one
      6. If bounced back from reviewer or tester: read the feedback carefully, then execute the actual fix commands — edit files, run build, run tests. Never output "done" without tool calls.
      7. Write tests first based on the Given/When/Then scenarios in the spec files
      8. Implement the code to make tests pass
      9. Ensure `pnpm run build` passes with no errors
      10. Run `pnpm test` to verify all tests pass

      After implementation, before reporting done:
      11. Add a changeset file (`.changeset/<short-slug>.md`) with correct bump type:
          - `patch` for bug fixes, internal refactors, test-only changes
          - `minor` for new features, new CLI commands, new API surfaces
          - `major` for breaking changes
          List every affected package in the changeset frontmatter.
      12. Update documentation if the change affects user-facing behavior:
          - `README.md` — usage examples, feature descriptions
          - `.cards/` — architecture decision records (if applicable)
          - CLI prompt subcommand output (if CLI help text changes)
          - CLI `--help` text (if flags/commands are added or changed)

      If you cannot complete the implementation (e.g. the issue is too complex, blocked by external factors,
      or repeated attempts fail), set $status=failed with a reason.
    output: "List all files changed and provide a summary. Set $status to done (with branch/worktree), or failed (with reason)."
    frontmatter:
      oneOf:
        - properties:
            $status: { const: "done" }
            branch: { type: string }
            worktree: { type: string }
          required: [$status, branch, worktree]
        - properties:
            $status: { const: "failed" }
            reason: { type: string }
          required: [$status, reason]
  reviewer:
    description: "Code standards compliance check"
    goal: "You are a code reviewer. You verify code standards compliance — NOT functionality (that's the tester's job)."
    capabilities:
      - code-review
      - static-analysis
    procedure: |
      The worktree path is provided in your task prompt. cd into it first.

      Before reviewing, verify the git branch:
      1. Run `git branch --show-current` — confirm the branch name references the issue number being worked on
      2. If the branch doesn't correspond to the issue, flag it in your output and reject

      Then perform code review:
      Hard checks (must all pass):
      3. `pnpm run build` — no build errors
      4. `pnpm run check` — no lint violations
      5. TypeScript strict mode — no type errors

      Soft checks (review against project conventions if CLAUDE.md / .cursor/rules exist):
      - Naming conventions, module boundaries, code style
      - No `console.log` in production code
      - No dynamic imports in production code

      Documentation & changeset checks:
      6. Changeset exists in `.changeset/` with correct bump type (`patch`/`minor`/`major`) and lists all affected packages
      7. If the change is user-facing, documentation is updated:
         - `README.md` reflects new/changed behavior
         - `.cards/` architecture cards updated if design decisions changed
         - CLI prompt subcommand output updated (if it generates skill/reference content)
         - CLI `--help` text matches new flags/commands

      Spec file checks:
      8. Verify that any new or modified spec files in `specs/` follow the format in `specs/README.md`
      9. Spec frontmatter has required fields (scenario, feature, tags)

      Only review standards compliance. Do NOT test functionality.
      If rejecting, you MUST explain the specific reason in your output.
    output: "Explain your decision with specific file/line references. Set $status to approved (with branch/worktree) or rejected (with comments)."
    frontmatter:
      oneOf:
        - properties:
            $status: { const: "approved" }
            branch: { type: string }
            worktree: { type: string }
          required: [$status, branch, worktree]
        - properties:
            $status: { const: "rejected" }
            comments: { type: string }
            worktree: { type: string }
          required: [$status, comments, worktree]
  tester:
    description: "Functional correctness verification against spec files"
    goal: "You are a tester agent. You verify that the implementation correctly satisfies every scenario defined in the spec files."
    capabilities:
      - testing
    procedure: |
      The worktree path is provided in your task prompt. cd into it first.

      1. Run `pnpm test` for automated test verification — all tests must pass
      2. Find the spec files for THIS issue: look at the planner step output in the thread history for the specFiles list. Only verify those files — do NOT scan all files in specs/.
      3. For each spec file from the planner:
         a. Read the file: `cat specs/<file>.md`
         b. Parse the Given/When/Then sections
         c. Verify each **Then** condition is satisfied:
            - If the spec describes CLI output, run the exact command and compare
            - If the spec describes an API behavior, check that a test covers it and passes
            - If the spec describes an error condition, verify the error is handled as specified
         d. Record pass/fail per Then condition with evidence (actual output)
      4. Build a verification report as a markdown string. Format:
         ```
         ## <spec-file-name>
         - [PASS] <Then condition 1> — <evidence>
         - [PASS] <Then condition 2> — <evidence>
         - [FAIL] <Then condition 3> — expected: X, actual: Y
         ```
         This report MUST be included in your frontmatter `report` field for ALL outcomes (passed, fix_code, fix_spec).
      5. Determine outcome:
         - passed: ALL Then conditions in the planner's spec files verified + pnpm test passes
         - fix_code: tests fail or implementation doesn't match spec → send back to developer
         - fix_spec: the spec itself is wrong or incomplete → send back to planner
    output: "Report test results per spec file and per Then condition in the report field. Set $status to passed (with branch/worktree/report), fix_code (with report), or fix_spec (with report)."
    frontmatter:
      oneOf:
        - properties:
            $status: { const: "passed" }
            report: { type: string }
            branch: { type: string }
            worktree: { type: string }
          required: [$status, report, branch, worktree]
        - properties:
            $status: { const: "fix_code" }
            report: { type: string }
            branch: { type: string }
            worktree: { type: string }
          required: [$status, report, branch, worktree]
        - properties:
            $status: { const: "fix_spec" }
            report: { type: string }
            branch: { type: string }
            worktree: { type: string }
          required: [$status, report, branch, worktree]
  committer:
    description: "Commits and creates PR"
    goal: "You are a committer agent. You create a clean commit and push a PR linking the original issue."
    capabilities: []
    procedure: |
      The worktree path, branch name, and repo info are provided in your task prompt.
      cd into the worktree first.

      IMPORTANT: You MUST execute every step via shell commands. Do NOT skip steps or fabricate output.

      Note: You inherit the developer's worktree and branch. Do NOT create a new branch.
      1. Stage all changes: `git add -A`
      2. Commit with a descriptive message referencing the issue: `git commit -m "type: description\n\nFixes #N"`
         - If nothing to commit (clean tree), skip to step 3.
      3. Push the branch: `git push -u origin <branch-name>`
         - If push hook fails: capture the error log in your output, mark hook_failed
      4. On push success, create a PR. Run this from within the worktree directory:
         `tea pr create -t "title" -d "description"`
         - Do NOT use `--repo`, `--title`, or `--description` — they don't work. Use `-t` and `-d`.
         - Do NOT use `gh` — this is a Gitea repo, not GitHub.
         - PR description must include: What / Why / Changes / Ref sections, with `Fixes #N` in Ref
         - On tea failure: capture stderr/stdout, include PR details for manual creation, mark hook_failed
      5. After PR creation, clean up the worktree:
         - cd to the repo root (parent of .worktrees)
         - `git worktree remove <worktree-path>`
    output: "Include PR URL on success or error log on failure. Set $status to committed (with prUrl) or hook_failed (with error)."
    frontmatter:
      oneOf:
        - properties:
            $status: { const: "committed" }
            prUrl: { type: string }
          required: [$status, prUrl]
        - properties:
            $status: { const: "hook_failed" }
            error: { type: string }
            branch: { type: string }
            worktree: { type: string }
          required: [$status, error, branch, worktree]
graph:
  $START:
    new: { role: "planner", prompt: "Analyze the issue and write behavior specs in specs/." }
    resume: { role: "planner", prompt: "Review the previous run output and continue the work." }
  planner:
    ready: { role: "developer", prompt: "Implement the behavior defined in spec files (comma-separated): {{ specFiles | join: \", \" }}. Worktree: {{ worktree }}, branch: {{ branch }}. Repo: {{ repoPath }}. Do NOT create a new worktree — the planner already created it." }
    continue: { role: "developer", prompt: "Continue work on existing branch {{ branch }} at worktree {{ worktree }}. Implement the revised specs (comma-separated): {{ specFiles | join: \", \" }}. Repo: {{ repoPath }}. Do NOT create a new branch or worktree — cd into the existing worktree and work there." }
  developer:
    done: { role: "reviewer", prompt: "Review branch {{ branch }} at {{ worktree }} for code standards compliance." }
    failed: { role: "$END", prompt: "Developer failed: {{ reason }}. Ending workflow." }
  reviewer:
    rejected: { role: "developer", prompt: "Reviewer rejected: {{ comments }}. Fix the issues at {{ worktree }}." }
    approved: { role: "tester", prompt: "Review passed. Verify implementation against spec files on branch {{ branch }} at {{ worktree }}." }
  tester:
    fix_code: { role: "developer", prompt: "Tests found code issues: {{ report }}. Fix and re-submit at {{ worktree }} on branch {{ branch }}." }
    fix_spec: { role: "planner", prompt: "Tests found spec issues: {{ report }}. Revise the spec files at {{ worktree }} on branch {{ branch }}." }
    passed: { role: "committer", prompt: "All specs verified. Commit and push branch {{ branch }} from {{ worktree }}." }
  committer:
    hook_failed: { role: "developer", prompt: "Push hook failed: {{ error }}. Fix and re-submit at {{ worktree }} on branch {{ branch }}." }
    committed: { role: "$END", prompt: "PR created: {{ prUrl }}. Workflow complete." }
