version: 1
name: "release"
description: "Release workflow for proman-managed monorepo with $SUSPEND gate for PR review."
roles:
  preflight:
    description: "Verify repository readiness for release"
    goal: "Check all pre-flight conditions for releasing the monorepo."
    capabilities:
      - git
      - npm
    procedure: |
      cd into the repo path from the task prompt.

      Check base conditions — abort on first failure with `$status: not_ready`:

      1. On `main` branch (`git branch --show-current`)
      2. Clean working tree (`git status --porcelain` is empty)
      3. Up to date (`git pull --ff-only` succeeds)
      4. CI green on HEAD:
         ```bash
         GITEA_TOKEN=$(cfg get GITEA_TOKEN)
         HEAD_SHA=$(git rev-parse HEAD)
         ```
         Poll `GET /api/v1/repos/<owner/repo>/commits/${HEAD_SHA}/status` up to 10× (30s interval).
         Accept `success`. Fail on `failure`/`error`. Timeout after ~5min if still `pending`.

      Then check changeset and publish state:

      5. Look for pending changesets:
         ```bash
         find .changeset -name '*.md' ! -name 'README.md' -type f
         ```

      6. If no changesets, check for unpublished packages.
         Read `proman.yaml` to get the package list. For each non-private package,
         read its `package.json` version and check npm:
         ```bash
         npm view <package-name>@<local-version> version 2>/dev/null
         ```
         Collect packages where the local version is NOT yet on npm.

      Decision:
      - Changesets found → output `$status: ready` with changeset list
      - No changesets, unpublished packages exist → output `$status: already_bumped` with package list
      - No changesets, all packages already published → output `$status: not_ready` with reason "no pending changesets and all current versions published"

      Pass through `repo` and `repoPath` from the task prompt in all non-error outputs.
    output: "ready, already_bumped, or not_ready"
    frontmatter:
      oneOf:
        - properties:
            $status: { const: "ready" }
            changesets: { type: string }
            repo: { type: string }
            repoPath: { type: string }
          required: [$status, changesets, repo, repoPath]
        - properties:
            $status: { const: "already_bumped" }
            packages: { type: string }
            repo: { type: string }
            repoPath: { type: string }
          required: [$status, packages, repo, repoPath]
        - properties:
            $status: { const: "not_ready" }
            reason: { type: string }
          required: [$status, reason]

  bumper:
    description: "Bump versions via proman, suspend for user confirmation, then open and merge PR"
    goal: "Bump versions, let user confirm, then create and merge the release PR."
    capabilities:
      - git
      - npm
    procedure: |
      cd into the repo path.

      **First run — bump and suspend for confirmation:**

      1. Create a release branch:
         ```bash
         BRANCH_NAME="release/$(date +%Y%m%d-%H%M)"
         git checkout -b "$BRANCH_NAME"
         ```

      2. Run proman bump to consume changesets and bump versions:
         ```bash
         npx proman bump
         ```
         Record the output — it lists bumped packages and their new versions.
         If it fails, abort: `git checkout main`, output `$status: "$SUSPEND"` with the error so a human can investigate.

      3. Build and test to verify the bump is clean:
         ```bash
         pnpm build && pnpm test
         ```
         If either fails, abort: `git checkout main`, output `$status: "$SUSPEND"` with the error so a human can investigate.

      4. Emit `$SUSPEND` with the list of bumped packages and new versions for user confirmation.

      **On resume — commit, open PR, merge directly:**

      1. Commit and push:
         ```bash
         git add -A
         git commit -m "release: bump versions

         <list bumped packages and new versions from proman bump output>"
         git push --no-verify -u origin "$BRANCH_NAME"
         ```

      2. Open PR via Gitea API:
         ```bash
         GITEA_TOKEN=$(cfg get GITEA_TOKEN)
         curl -s -X POST \
           -H "Authorization: token ${GITEA_TOKEN}" \
           -H "Content-Type: application/json" \
           "https://git.shazhou.work/api/v1/repos/<owner/repo>/pulls" \
           -d '{"title":"release: bump versions","head":"'"$BRANCH_NAME"'","base":"main","body":"..."}'
         ```
         Record the PR number.

      3. Merge the PR directly via Gitea API (no review required):
         ```bash
         curl -s -X POST \
           -H "Authorization: token ${GITEA_TOKEN}" \
           -H "Content-Type: application/json" \
           "https://git.shazhou.work/api/v1/repos/<owner/repo>/pulls/<PR_NUMBER>/merge" \
           -d '{"Do":"merge","merge_message_field":"release: bump versions"}'
         ```
         If merge fails, output `$status: "$SUSPEND"` with reason so a human can resolve.

      4. Update local main:
         ```bash
         git checkout main && git pull --ff-only
         ```

      5. Output `$status: merged` with packages, repo, and repoPath.

    output: "merged after user confirms versions, or $SUSPEND while waiting/on error"
    frontmatter:
      oneOf:
        - properties:
            $status: { const: "merged" }
            packages: { type: string }
            repo: { type: string }
            repoPath: { type: string }
          required: [$status, packages, repo, repoPath]

  publisher:
    description: "Publish packages to npm, tag, verify, sync"
    goal: "Publish bumped packages to npm and finalize the release."
    capabilities:
      - git
      - npm
    procedure: |
      cd into the repo path. Should be on main with bumped versions already merged.

      1. Verify on main, clean tree.

      2. Run proman publish (automation token, no OTP needed):
         ```bash
         npx proman publish
         ```
         This handles: build → test → check → npm publish → git tag → push.
         If it fails, output `$status: "$SUSPEND"` with details on which packages succeeded/failed.

      3. Verify published packages on npm:
         For each non-private package in `proman.yaml`, check:
         ```bash
         npm view <package-name>@<expected-version> version
         ```
         Each should return the expected version.

      4. Verify git tags exist:
         ```bash
         git tag -l '*@v*'
         ```

      5. Sync to GitHub (if remote exists):
         ```bash
         git remote -v | grep github
         git push github main --tags
         ```
         Note result but do NOT fail the release if GitHub sync fails.

      6. Output `$status: released` with packages, tags, githubSync.

    output: "released, or $SUSPEND on error/verification failure"
    frontmatter:
      oneOf:
        - properties:
            $status: { const: "released" }
            packages: { type: string }
            tags: { type: string }
            githubSync: { type: string }
          required: [$status, packages, tags]

graph:
  $START:
    new: { role: "preflight", prompt: "Pre-flight check for releasing {{ repo }} from {{ repoPath }}." }
    resume: { role: "preflight", prompt: "Re-check release readiness for {{ repo }} at {{ repoPath }}." }
  preflight:
    ready: { role: "bumper", prompt: "Bump versions for {{ repo }} at {{ repoPath }}. Pending changesets:\n{{ changesets }}" }
    already_bumped: { role: "publisher", prompt: "Publish {{ repo }} from {{ repoPath }}. Unpublished packages:\n{{ packages }}" }
    not_ready: { role: "$END", prompt: "⏸ Release aborted: {{ reason }}" }
  bumper:
    merged: { role: "publisher", prompt: "Publish {{ repo }} from {{ repoPath }}. Bumped packages:\n{{ packages }}" }
  publisher:
    released: { role: "$END", prompt: "✅ Released {{ packages }}. Tags: {{ tags }}. GitHub: {{ githubSync }}" }
